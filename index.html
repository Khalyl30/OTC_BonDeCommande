<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon de Commande</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="company-header">
            <strong>O.T.C</strong><br>
            <strong>Optical Trade Company</strong><br>
            <p>
                4 Av. Taieb Mhiri App. N°2 - 2080 ARIANA<br>
                Tél : 00 216 29 808 579 / SAV : 29 760 935<br>
                E-mail : opticaltrade.company@gmail.com
            </p>
        </header>

        <h1>Bon de Commande</h1>

        <form id="orderForm">
            <section class="section">
                <div class="client-grid">
                    <div class="field-group">
                        <label for="orderDate">Date :</label>
                        <input type="date" id="orderDate" required>
                    </div>

                    <div class="field-group">
                        <label for="salesAgent">Agent Commercial :</label>
                        <input type="text" id="salesAgent" required autocapitalize="words">
                    </div>

                    <div class="field-group">
                        <label for="clientName">Client :</label>
                        <input type="text" id="clientName" required>
                    </div>

                    <div class="field-group">
                        <label for="clientAddress">Adresse :</label>
                        <input type="text" id="clientAddress">
                    </div>

                    <div class="field-group">
                        <label for="clientEmail">Email :</label>
                        <input type="email" id="clientEmail">
                    </div>

                    <div class="field-group">
                        <label for="managerPhone">N° de tél (Responsable) :</label>
                        <input type="text" id="managerPhone" inputmode="tel" autocomplete="tel">
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="controls-panel">
                    <div class="references-summary">
                        <button type="button" id="clearForm" class="clear-btn">Réinitialiser</button>
                        <p class="total-line">Quantité : <span id="totalQuantity">0</span></p>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="addReference">Ajouter une référence</button>
                        <button type="submit" id="generateOrder">Générer bon de commande</button>
                    </div>

                    <p id="formStatus" class="form-status" aria-live="polite"></p>
                </div>

                <h2>Références de Montures</h2>

                <div id="referencesContainer">
                    <div class="reference-item">
                        <input type="text" class="reference" placeholder="Référence">
                        <div class="quantity-control">
                            <button type="button" class="quantity-btn decrement" aria-label="Diminuer la quantité">-</button>
                            <input type="number" class="quantity" min="1" value="1" inputmode="numeric">
                            <button type="button" class="quantity-btn increment" aria-label="Augmenter la quantité">+</button>
                        </div>
                        <input type="text" class="discount" placeholder="Remise">
                    </div>
                </div>
            </section>
        </form>

        <section id="generatedResults" class="generated-results" hidden>
            <div class="generated-results-header">
                <h2>Bon de commande</h2>
            </div>
            <div id="generatedList" class="generated-list"></div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
