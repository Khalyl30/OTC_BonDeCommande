<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon de Commande</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="company-header">
            <strong>O.T.C</strong><br>
            <strong>Optical Trade Company</strong><br>
            <p>4 Av.Taieb Mhiri App.N°2 - 2080 ARIANA<br>
            Tél: 0021629 808 579 / SAV : 29 760 935<br>
            E-mail: opticaltrade.company@gmail.com</p>
        </div>
        <h1>Bon de Commande</h1>
        <form id="orderForm">
            <div class="section">
                <h2>Informations Client</h2>
                <label for="orderDate">Date:</label>
                <input type="date" id="orderDate" required>

                <label for="clientName">Nom du Client:</label>
                <input type="text" id="clientName" required oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase()">

                <label for="clientAddress">Adresse:</label>
                <input type="text" id="clientAddress" required oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase()">

                <label for="clientEmail">Email:</label>
                <input type="email" id="clientEmail">
            </div>

            <div class="section">
                <h2>RÉFÉRENCES DE MONTURES</h2>
                <div id="referencesContainer">
                    <div class="reference-item">
                        <input type="text" class="reference" placeholder="Référence de monture" oninput="this.value = this.value.toUpperCase()">
                        <input type="number" class="quantity" placeholder="Quantité" min="1" value="1">
                        <input type="number" class="discount" placeholder="Remise" min="0" step="0.01">
                    </div>
                </div>
                <div class="reference-actions">
                    <button type="button" id="addReference">Ajouter une Référence</button>
                    <button type="button" id="removeReference" class="remove-btn">Supprimer</button>
                </div>
            </div>

            <p>Quantité: <span id="totalQuantity">0</span></p>

            <button type="submit">Générer bon de commande</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
